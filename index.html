<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ==========================
// KAART
// ==========================

var map = L.map('map').setView([52.1, 5.3], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ==========================
// DATA
// ==========================

// Familie Frank
var routeFrank = [
    { name:"Amsterdam", coords:[52.3702,4.8952], date:"6 juli 1942",
      persons:["Anne Frank","Margot Frank","Otto Frank","Edith Frank"],
      desc:"Onderduik in het Achterhuis." },

    { name:"Amsterdam (arrestatie)", coords:[52.3702,4.8952], date:"4 augustus 1944",
      persons:["Anne Frank","Margot Frank","Otto Frank","Edith Frank"],
      desc:"Arrestatie door de Duitse bezetter." },

    { name:"Westerbork", coords:[52.9167,6.5833], date:"8 augustus 1944",
      persons:["Anne Frank","Margot Frank","Otto Frank","Edith Frank"],
      desc:"Transport naar Westerbork." },

    { name:"Auschwitz", coords:[50.0359,19.1783], date:"3 september 1944",
      persons:["Anne Frank","Margot Frank","Otto Frank","Edith Frank"],
      desc:"Aankomst en scheiding." },

    { name:"Bergen-Belsen", coords:[52.7596,9.9059], date:"oktober 1944",
      persons:["Anne Frank","Margot Frank"],
      desc:"Overplaatsing." }
];

// De Winter + repatriëring
var routeDeWinter = [
    { name:"Zutphen", coords:[52.1400,6.1944], date:"1943",
      persons:["Rosa de Winter","Judy de Winter"],
      desc:"Arrestatie." },

    { name:"Westerbork", coords:[52.9167,6.5833], date:"1943",
      persons:["Rosa de Winter","Judy de Winter"],
      desc:"Transport." },

    { name:"Auschwitz", coords:[50.0359,19.1783], date:"1943",
      persons:["Rosa de Winter","Judy de Winter"],
      desc:"Aankomst." },

    { name:"Kratzau", coords:[50.8167,14.9667], date:"1944",
      persons:["Judy de Winter"],
      desc:"Dwangarbeid." },

    { name:"Odessa", coords:[46.4825,30.7233], date:"1945",
      persons:["Rosa de Winter","Otto Frank"],
      desc:"Repatriëring via oosten." },

    { name:"Marseille", coords:[43.2965,5.3698], date:"1945",
      persons:["Rosa de Winter","Otto Frank"],
      desc:"Aankomst per schip." },

    { name:"Nederland", coords:[52.0907,5.1214], date:"1945",
      persons:["Rosa de Winter","Otto Frank"],
      desc:"Terugkeer." },

    // Judy repatriëring
    { name:"Liberec", coords:[50.7671,15.0562], date:"8 mei 1945",
      persons:["Judy de Winter"],
      desc:"Bevrijding." },

    { name:"Praag", coords:[50.0755,14.4378], date:"mei 1945",
      persons:["Judy de Winter"],
      desc:"Transport." },

    { name:"Pilsen", coords:[49.7384,13.3736], date:"mei 1945",
      persons:["Judy de Winter"],
      desc:"Doortocht." },

    { name:"Bayreuth", coords:[49.9481,11.5783], date:"mei 1945",
      persons:["Judy de Winter"],
      desc:"Transport." },

    { name:"België", coords:[50.8503,4.3517], date:"mei 1945",
      persons:["Judy de Winter"],
      desc:"Aankomst." },

    { name:"Roermond", coords:[51.1942,5.9870], date:"31 mei 1945",
      persons:["Judy de Winter","Rosa de Winter"],
      desc:"Hereniging." }
];

// ==========================
// MARKERS
// ==========================

function addMarkers(route){
    route.forEach(function(stop){
        L.marker(stop.coords)
        .addTo(map)
        .bindPopup(
            "<b>"+stop.name+"</b><br>"+
            stop.date+"<br>"+
            "<i>"+stop.persons.join(", ")+"</i><br>"+
            stop.desc
        );
    });
}

addMarkers(routeFrank);
addMarkers(routeDeWinter);

// ==========================
// ROUTES
// ==========================

// Frank deportatie
L.polyline([
[52.3702,4.8952],[52.9167,6.5833],[53.2194,6.5665],[53.1833,7.2167],
[53.0793,8.8017],[52.3759,9.7320],[52.5200,13.4050],
[51.1079,17.0385],[50.0359,19.1783]
],{color:'red'}).addTo(map);

// Anne & Margot
L.polyline([
[50.0359,19.1783],[52.5200,13.4050],[53.5511,9.9937],[52.7596,9.9059]
],{color:'blue'}).addTo(map);

// De Winter deportatie
L.polyline([
[52.1400,6.1944],[52.9167,6.5833],[53.2194,6.5665],[53.1833,7.2167],
[53.0793,8.8017],[52.3759,9.7320],[52.5200,13.4050],
[51.1079,17.0385],[50.0359,19.1783]
],{color:'green'}).addTo(map);

// Judy → Kratzau
L.polyline([
[50.0359,19.1783],[50.1109,8.6821],[50.8167,14.9667]
],{color:'orange',dashArray:'5,5'}).addTo(map);

// Rosa + Otto repatriëring (zee)
L.polyline([
[50.0359,19.1783],[49.8397,24.0297],[46.4825,30.7233],
[43,34],[38,28],[36,20],[43.2965,5.3698],
[50.1109,8.6821],[52.0907,5.1214]
],{color:'black',dashArray:'8,10'}).addTo(map);

// Judy repatriëring (land)
L.polyline([
[50.8167,14.9667],[50.7671,15.0562],[50.0755,14.4378],
[49.7384,13.3736],[49.9481,11.5783],
[50.8503,4.3517],[51.1942,5.9870]
],{color:'purple'}).addTo(map);

</script>

</body>
</html>
