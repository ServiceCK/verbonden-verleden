<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// Kaart initialiseren
var map = L.map('map').setView([52.1, 5.3], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ==========================
// DATA: Familie Frank
// ==========================

var route = [
    {
        name: "Amsterdam",
        coords: [52.3702, 4.8952],
        date: "6 juli 1942",
        persons: ["Anne Frank", "Margot Frank", "Otto Frank", "Edith Frank"],
        desc: "Onderduik in het Achterhuis."
    },
    {
        name: "Amsterdam (arrestatie)",
        coords: [52.3702, 4.8952],
        date: "4 augustus 1944",
        persons: ["Anne Frank", "Margot Frank", "Otto Frank", "Edith Frank"],
        desc: "Arrestatie door de Duitse bezetter."
    },
    {
        name: "Westerbork",
        coords: [52.9167, 6.5833],
        date: "8 augustus 1944",
        persons: ["Anne Frank", "Margot Frank", "Otto Frank", "Edith Frank"],
        desc: "Transport naar doorgangskamp Westerbork."
    },
    {
        name: "Auschwitz",
        coords: [50.0359, 19.1783],
        date: "3 september 1944",
        persons: ["Anne Frank", "Margot Frank", "Otto Frank", "Edith Frank"],
        desc: "Aankomst in Auschwitz. Scheiding van mannen en vrouwen."
    },
    {
        name: "Bergen-Belsen",
        coords: [52.7596, 9.9059],
        date: "oktober 1944",
        persons: ["Anne Frank", "Margot Frank"],
        desc: "Anne en Margot worden overgebracht naar Bergen-Belsen."
    }
];

// ==========================
// MARKERS
// ==========================

route.forEach(function(stop) {

    var personsList = stop.persons.join(", ");

    L.marker(stop.coords)
        .addTo(map)
        .bindPopup(
            "<b>" + stop.name + "</b><br>" +
            stop.date + "<br>" +
            "<i>" + personsList + "</i><br>" +
            stop.desc
        );
});

// ==========================
// ROUTES
// ==========================

// Gezamenlijke route tot Auschwitz
var familyRoute = [
    [52.3702, 4.8952], // Amsterdam
    [52.9167, 6.5833], // Westerbork
    [53.2194, 6.5665], // Groningen
    [53.1833, 7.2167], // grens
    [53.0793, 8.8017], // Bremen
    [52.3759, 9.7320], // Hannover
    [52.5200, 13.4050], // Berlijn
    [51.1079, 17.0385], // Wrocław
    [50.0359, 19.1783]  // Auschwitz
];

L.polyline(familyRoute, {
    color: 'red',
    weight: 4,
    opacity: 0.8
}).addTo(map);

// Route Anne & Margot naar Bergen-Belsen
var sistersRoute = [
    [50.0359, 19.1783], // Auschwitz
    [52.5200, 13.4050], // Berlijn
    [53.5511, 9.9937],  // Hamburg
    [52.7596, 9.9059]   // Bergen-Belsen
];

L.polyline(sistersRoute, {
    color: 'blue',
    weight: 4,
    opacity: 0.8
}).addTo(map);

</script>

</body>
</html>
